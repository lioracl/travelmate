name: Deploy TravelMate Preview

on:
  push:
    branches: [preview]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify JavaScript syntax
        run: |
          find assets -name '*.js' -print0 | xargs -0 -n1 node --check

      - name: Verify required files
        run: |
          test -f index.html
          test -f assets/app.js
          test -f assets/styles.css
          test -f trip/custom/index.html

  deploy:
    needs: verify
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare static site
        run: |
          mkdir _site
          rsync -av \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.agents' \
            --exclude='.codex' \
            --exclude='docs' \
            --exclude='AGENTS.md' \
            --exclude='README.md' \
            ./ _site/
          touch _site/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

